<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Klaslokaal — Education</title>
<meta name="description" content="Klassikale tools voor in de les.">
<link rel="stylesheet" href="assets/css/shared.css">
<style>
  /* ========================================================================
     KLASLOKAAL — pagina-specifieke stijlen
     De hero is een 8x4 raster van wisbordje-tegels met wiskundige tekeningen.
     Tegels flippen automatisch en bij hover, met een radial mask zodat de
     hero-tekst centraal leesbaar blijft.
     ======================================================================== */

  /* Override de standaard hero-achtergrond — voor klaslokaal willen we
     puur zwart, geen radial gradient, omdat de tegels zelf het beeld zijn. */
  .hero { background: #000; display: flex; align-items: center; justify-content: center; }

  .tile-wall {
    position: absolute;
    inset: 0;
    z-index: 1;
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    grid-auto-rows: 1fr;
    gap: 14px;
    padding: 90px 60px;
    perspective: 1500px;
    -webkit-mask-image: radial-gradient(ellipse 60% 55% at center, rgba(0,0,0,0) 0%, rgba(0,0,0,0) 35%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0.85) 70%, rgba(0,0,0,1) 85%);
            mask-image: radial-gradient(ellipse 60% 55% at center, rgba(0,0,0,0) 0%, rgba(0,0,0,0) 35%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0.85) 70%, rgba(0,0,0,1) 85%);
  }

  .tile {
    position: relative;
    aspect-ratio: 4 / 3;
    transform-style: preserve-3d;
    transition: transform 0.7s cubic-bezier(0.4, 0.0, 0.2, 1);
  }
  .tile.flipped { transform: rotateY(180deg); }

  .tile-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 6px;
    background: #ede0c8;
    box-shadow:
      0 2px 0 rgba(0,0,0,0.4),
      0 4px 16px rgba(0,0,0,0.5),
      inset 0 0 24px rgba(120,90,40,0.05);
    overflow: hidden;
    background-image:
      linear-gradient(135deg, rgba(255,255,255,0.04) 0%, rgba(0,0,0,0.04) 100%),
      radial-gradient(circle at 30% 20%, rgba(0,0,0,0.02) 0%, rgba(0,0,0,0) 50%);
  }
  .tile-face.back { transform: rotateY(180deg); }
  .tile-face svg { width: 100%; height: 100%; display: block; }

  /* Hero-tekst zit op de voorgrond, boven de tegels */
  .hero-content {
    position: relative;
    z-index: 2;
    text-align: center;
    max-width: 720px;
    padding: 0 32px;
  }
  .hero-content .eyebrow {
    font-size: 12px; letter-spacing: 0.32em; opacity: 0.55; margin-bottom: 28px;
  }
  .hero-content h1 {
    font-size: 64px; line-height: 1.05; font-weight: 500;
    letter-spacing: -0.02em; margin-bottom: 28px;
  }
  .hero-content p {
    font-size: 18px; opacity: 0.7; line-height: 1.65; margin-bottom: 48px;
    max-width: 560px; margin-left: auto; margin-right: auto;
  }
  .hero-content .ctas {
    display: flex; gap: 18px; justify-content: center; flex-wrap: wrap;
  }
  .hero-content .cta { min-width: 200px; text-align: center; }
  .hero-content .cta.primary { background: #fff; color: #000; }
  .hero-content .cta.primary:hover { background: transparent; color: #fff; }

  /* "Terug naar home"-link onderaan de hero */
  .back-link {
    position: absolute;
    bottom: 36px; left: 50%;
    transform: translateX(-50%);
    z-index: 5;
    font-size: 11px; letter-spacing: 0.3em;
    opacity: 0.4; text-decoration: none; color: inherit;
    transition: opacity 0.2s;
  }
  .back-link:hover { opacity: 0.9; }

  @media (max-width: 1100px) {
    .tile-wall { grid-template-columns: repeat(5, 1fr); padding: 80px 28px; }
    .hero-content h1 { font-size: 44px; }
  }
  @media (max-width: 700px) {
    .tile-wall { grid-template-columns: repeat(3, 1fr); padding: 80px 16px; gap: 10px; }
    .hero-content h1 { font-size: 36px; }
    .hero-content p { font-size: 16px; }
  }
</style>
</head>
<body>

<canvas id="ambient-canvas"></canvas>

<section class="hero">
  <nav class="topbar">
    <a href="index.html" class="logo-link">
      <div class="mark"></div>
      <span class="name">EDUCATION</span>
    </a>
    <div class="nav">
      <a href="index.html#tools">tools</a>
      <a href="about.html">about</a>
    </div>
  </nav>

  <div class="tile-wall" id="tile-wall"></div>

  <div class="hero-content">
    <div class="eyebrow">IN HET KLASLOKAAL</div>
    <h1>Wisbordjes.</h1>
    <p>Klassikale interactie waarbij elke leerling tegelijk meedoet. Geen handen meer, geen wachten, alleen directe respons.</p>
    <div class="ctas">
      <a href="Wisbordje-leerling.html" class="cta primary">LEERLING &rarr;</a>
      <a href="wisbordje-docent.html" class="cta">DOCENT</a>
    </div>
  </div>

  <a href="index.html" class="back-link">&larr; TERUG NAAR HOME</a>
</section>

<footer>
  <span>&copy; Bart Kamp</span>
  <span><a href="https://github.com/BartJKamp/Education">github</a></span>
</footer>

<script src="assets/js/shared.js"></script>
<script>
/* =====================================================================
   KLASLOKAAL — pagina-specifieke logica
   1) Een "tegelmuur" van wisbordjes met 42 unieke wiskundige tekeningen.
      Elke tegel heeft een voorkant en een achterkant (verschillende tekening).
      Hover op een tegel laat hem flippen; tegelijk wordt de nu-verborgen kant
      vervangen door een nieuwe willekeurige tekening — zodat je nooit dezelfde
      tegel twee keer hetzelfde ziet.
   2) Auto-flip-loop: elke 800-2200 ms flipt een willekeurige tegel uit zichzelf,
      voor levendigheid op de achtergrond.
   3) Ambient drift via shared.js (consistent met overige paginas).
   ===================================================================== */

const STROKE_COLORS = [
  'rgba(20,80,100,0.85)',
  'rgba(80,150,170,0.85)',
  'rgba(180,140,60,0.85)',
  'rgba(100,40,40,0.85)',
  'rgba(50,50,50,0.9)',
];
function pickStroke(){ return STROKE_COLORS[Math.floor(Math.random() * STROKE_COLORS.length)]; }

const DRAWINGS = [];

// 1. Quadratic curve y=x²
DRAWINGS.push(() => { const c = pickStroke(); return `
  <path d="M 12 65 L 90 65" stroke="${c}" stroke-width="1.2" fill="none"/>
  <path d="M 50 12 L 50 70" stroke="${c}" stroke-width="1.2" fill="none"/>
  <path d="M 88 63 L 91 65 L 88 67" stroke="${c}" stroke-width="1.2" fill="none"/>
  <path d="M 48 14 L 50 11 L 52 14" stroke="${c}" stroke-width="1.2" fill="none"/>
  <path d="M 22 60 Q 30 25, 50 18 Q 70 25, 78 60" stroke="${c}" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  <text x="80" y="35" font-family="Georgia" font-style="italic" font-size="6" fill="${c}">y=x²</text>`;});

// 2. Circle with radius
DRAWINGS.push(() => { const c = pickStroke(); return `
  <circle cx="50" cy="38" r="22" stroke="${c}" stroke-width="1.6" fill="none"/>
  <circle cx="50" cy="38" r="1.5" fill="${c}"/>
  <path d="M 50 38 L 70 28" stroke="${c}" stroke-width="1.2" fill="none" stroke-dasharray="2,1.5"/>
  <text x="60" y="36" font-family="Georgia" font-style="italic" font-size="5.5" fill="${c}">r</text>
  <text x="20" y="68" font-family="Georgia" font-style="italic" font-size="6" fill="${c}">A = πr²</text>`;});

// 3. Pythagoras
DRAWINGS.push(() => { const c = pickStroke(); return `
  <path d="M 22 60 L 78 60 L 22 22 Z" stroke="${c}" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
  <path d="M 22 55 L 27 55 L 27 60" stroke="${c}" stroke-width="1" fill="none"/>
  <text x="14" y="42" font-family="Georgia" font-style="italic" font-size="6" fill="${c}">a</text>
  <text x="48" y="68" font-family="Georgia" font-style="italic" font-size="6" fill="${c}">b</text>
  <text x="48" y="38" font-family="Georgia" font-style="italic" font-size="6" fill="${c}">c</text>
  <text x="58" y="22" font-family="Georgia" font-style="italic" font-size="5.5" fill="${c}">a²+b²=c²</text>`;});

// 4. Cube
DRAWINGS.push(() => { const c = pickStroke(); return `
  <path d="M 30 50 L 30 25 L 55 18 L 55 43 Z" stroke="${c}" stroke-width="1.4" fill="none" stroke-linejoin="round"/>
  <path d="M 30 50 L 55 43 L 80 50 L 55 57 Z" stroke="${c}" stroke-width="1.4" fill="none" stroke-linejoin="round"/>
  <path d="M 55 43 L 55 18 L 80 25 L 80 50" stroke="${c}" stroke-width="1.4" fill="none" stroke-linejoin="round"/>
  <text x="22" y="68" font-family="Georgia" font-style="italic" font-size="6" fill="${c}">V = s³</text>`;});

// 5. Linear equation
DRAWINGS.push(() => { const c = pickStroke(); return `
  <path d="M 12 65 L 90 65" stroke="${c}" stroke-width="1.2" fill="none"/>
  <path d="M 50 10 L 50 70" stroke="${c}" stroke-width="1.2" fill="none"/>
  <path d="M 18 58 L 82 22" stroke="${c}" stroke-width="1.7" fill="none" stroke-linecap="round"/>
  <text x="56" y="62" font-family="Georgia" font-style="italic" font-size="6" fill="${c}">y=mx+b</text>`;});

// 6. Fraction 3/8
DRAWINGS.push(() => { const c = pickStroke(); return `
  <text x="42" y="34" font-family="Georgia" font-style="italic" font-size="14" fill="${c}">3</text>
  <path d="M 38 38 L 58 38" stroke="${c}" stroke-width="1.5"/>
  <text x="42" y="55" font-family="Georgia" font-style="italic" font-size="14" fill="${c}">8</text>
  <text x="22" y="68" font-family="Georgia" font-style="italic" font-size="6" fill="${c}">= 0.375</text>`;});

// 7. Sigma sum (FIXED — opens to the right, like the Greek letter Σ)
DRAWINGS.push(() => { const c = pickStroke(); return `
  <path d="M 50 18 L 28 18 L 43 38 L 28 58 L 50 58" stroke="${c}" stroke-width="1.8" fill="none" stroke-linejoin="round"/>
  <text x="32" y="14" font-family="Georgia" font-style="italic" font-size="5" fill="${c}">n</text>
  <text x="30" y="68" font-family="Georgia" font-style="italic" font-size="5" fill="${c}">i=1</text>
  <text x="56" y="42" font-family="Georgia" font-style="italic" font-size="9" fill="${c}">i = n(n+1)/2</text>`;});

// 8. Pentagon with diagonals
DRAWINGS.push(() => { const c = pickStroke();
  const pts = [];
  for (let i = 0; i < 5; i++) {
    const a = -Math.PI/2 + i * 2*Math.PI/5;
    pts.push([50 + 22*Math.cos(a), 38 + 22*Math.sin(a)]);
  }
  const polyPath = `M ${pts[0][0].toFixed(1)} ${pts[0][1].toFixed(1)} L ${pts[1][0].toFixed(1)} ${pts[1][1].toFixed(1)} L ${pts[2][0].toFixed(1)} ${pts[2][1].toFixed(1)} L ${pts[3][0].toFixed(1)} ${pts[3][1].toFixed(1)} L ${pts[4][0].toFixed(1)} ${pts[4][1].toFixed(1)} Z`;
  const star = `M ${pts[0][0].toFixed(1)} ${pts[0][1].toFixed(1)} L ${pts[2][0].toFixed(1)} ${pts[2][1].toFixed(1)} L ${pts[4][0].toFixed(1)} ${pts[4][1].toFixed(1)} L ${pts[1][0].toFixed(1)} ${pts[1][1].toFixed(1)} L ${pts[3][0].toFixed(1)} ${pts[3][1].toFixed(1)} Z`;
  return `<path d="${polyPath}" stroke="${c}" stroke-width="1.4" fill="none" stroke-linejoin="round"/>
  <path d="${star}" stroke="${c}" stroke-width="1" fill="none" stroke-linejoin="round" opacity="0.7"/>
  <text x="20" y="68" font-family="Georgia" font-style="italic" font-size="5.5" fill="${c}">φ ≈ 1.618</text>`;});

// 9. Sine wave
DRAWINGS.push(() => { const c = pickStroke();
  let path = 'M 12 38 ';
  for (let x = 12; x <= 88; x += 2) {
    const y = 38 - 18 * Math.sin((x - 12) * 0.16);
    path += `L ${x.toFixed(1)} ${y.toFixed(1)} `;
  }
  return `<path d="M 12 38 L 90 38" stroke="${c}" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="${path}" stroke="${c}" stroke-width="1.7" fill="none" stroke-linecap="round"/>
  <text x="20" y="68" font-family="Georgia" font-style="italic" font-size="6" fill="${c}">y = sin(x)</text>`;});

// 10. System of equations
DRAWINGS.push(() => { const c = pickStroke(); return `
  <path d="M 22 22 L 22 58" stroke="${c}" stroke-width="1.4" fill="none"/>
  <text x="26" y="34" font-family="Georgia" font-style="italic" font-size="7" fill="${c}">2x + y = 5</text>
  <text x="26" y="50" font-family="Georgia" font-style="italic" font-size="7" fill="${c}">x − y = 1</text>
  <text x="22" y="68" font-family="Georgia" font-style="italic" font-size="6" fill="${c}">x=2, y=1</text>`;});

// 11. Number line
DRAWINGS.push(() => { const c = pickStroke(); return `
  <path d="M 10 38 L 92 38" stroke="${c}" stroke-width="1.4" fill="none"/>
  <path d="M 8 36 L 12 38 L 8 40" stroke="${c}" stroke-width="1.2" fill="none"/>
  <path d="M 92 36 L 96 38 L 92 40" stroke="${c}" stroke-width="1.2" fill="none"/>
  <line x1="25" y1="34" x2="25" y2="42" stroke="${c}" stroke-width="1.2"/>
  <line x1="50" y1="34" x2="50" y2="42" stroke="${c}" stroke-width="1.2"/>
  <line x1="75" y1="34" x2="75" y2="42" stroke="${c}" stroke-width="1.2"/>
  <text x="22" y="52" font-family="Georgia" font-style="italic" font-size="6" fill="${c}">−1</text>
  <text x="48" y="52" font-family="Georgia" font-style="italic" font-size="6" fill="${c}">0</text>
  <text x="73" y="52" font-family="Georgia" font-style="italic" font-size="6" fill="${c}">1</text>`;});

// 12. Quadratic formula
DRAWINGS.push(() => { const c = pickStroke(); return `
  <text x="14" y="36" font-family="Georgia" font-style="italic" font-size="7" fill="${c}">x =</text>
  <text x="32" y="32" font-family="Georgia" font-style="italic" font-size="6" fill="${c}">−b ± √(b²−4ac)</text>
  <path d="M 32 36 L 86 36" stroke="${c}" stroke-width="1.2"/>
  <text x="52" y="46" font-family="Georgia" font-style="italic" font-size="6" fill="${c}">2a</text>`;});

// 13. Venn diagram
DRAWINGS.push(() => { const c = pickStroke(); return `
  <circle cx="40" cy="38" r="20" stroke="${c}" stroke-width="1.5" fill="none"/>
  <circle cx="60" cy="38" r="20" stroke="${c}" stroke-width="1.5" fill="none"/>
  <text x="22" y="42" font-family="Georgia" font-style="italic" font-size="7" fill="${c}">A</text>
  <text x="72" y="42" font-family="Georgia" font-style="italic" font-size="7" fill="${c}">B</text>
  <text x="20" y="68" font-family="Georgia" font-style="italic" font-size="5.5" fill="${c}">A ∩ B</text>`;});

// 14. Spiral
DRAWINGS.push(() => { const c = pickStroke();
  let path = 'M 50 38 ';
  for (let t = 0; t < 5 * Math.PI; t += 0.15) {
    const r = t * 1.6;
    const x = 50 + r * Math.cos(t);
    const y = 38 + r * Math.sin(t);
    path += `L ${x.toFixed(1)} ${y.toFixed(1)} `;
  }
  return `<path d="${path}" stroke="${c}" stroke-width="1.5" fill="none" stroke-linecap="round"/>`;});

// 15. Derivative
DRAWINGS.push(() => { const c = pickStroke(); return `
  <text x="14" y="34" font-family="Georgia" font-style="italic" font-size="9" fill="${c}">d</text>
  <path d="M 14 38 L 26 38" stroke="${c}" stroke-width="1.2"/>
  <text x="14" y="48" font-family="Georgia" font-style="italic" font-size="9" fill="${c}">dx</text>
  <text x="32" y="42" font-family="Georgia" font-style="italic" font-size="9" fill="${c}">(x²) = 2x</text>`;});

// 16. Bar chart
DRAWINGS.push(() => { const c = pickStroke(); return `
  <path d="M 18 60 L 86 60" stroke="${c}" stroke-width="1.2"/>
  <path d="M 18 18 L 18 60" stroke="${c}" stroke-width="1.2"/>
  <rect x="24" y="44" width="10" height="16" stroke="${c}" stroke-width="1.2" fill="none"/>
  <rect x="38" y="32" width="10" height="28" stroke="${c}" stroke-width="1.2" fill="none"/>
  <rect x="52" y="38" width="10" height="22" stroke="${c}" stroke-width="1.2" fill="none"/>
  <rect x="66" y="22" width="10" height="38" stroke="${c}" stroke-width="1.2" fill="none"/>`;});

// 17. Limit
DRAWINGS.push(() => { const c = pickStroke(); return `
  <text x="20" y="36" font-family="Georgia" font-style="italic" font-size="8" fill="${c}">lim</text>
  <text x="18" y="48" font-family="Georgia" font-style="italic" font-size="5" fill="${c}">x→0</text>
  <text x="42" y="40" font-family="Georgia" font-style="italic" font-size="9" fill="${c}">sin(x)/x = 1</text>`;});

// 18. Angle in circle
DRAWINGS.push(() => { const c = pickStroke(); return `
  <circle cx="50" cy="38" r="22" stroke="${c}" stroke-width="1.4" fill="none"/>
  <path d="M 50 38 L 72 38" stroke="${c}" stroke-width="1.3"/>
  <path d="M 50 38 L 65 22" stroke="${c}" stroke-width="1.3"/>
  <path d="M 60 38 A 10 10 0 0 0 60 30" stroke="${c}" stroke-width="1" fill="none"/>
  <text x="62" y="34" font-family="Georgia" font-style="italic" font-size="6" fill="${c}">θ</text>`;});

// 19. Cosine wave (different from sine)
DRAWINGS.push(() => { const c = pickStroke();
  let path = 'M 12 38 ';
  for (let x = 12; x <= 88; x += 2) {
    const y = 38 - 18 * Math.cos((x - 12) * 0.16);
    path += `L ${x.toFixed(1)} ${y.toFixed(1)} `;
  }
  return `<path d="M 12 38 L 90 38" stroke="${c}" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="${path}" stroke="${c}" stroke-width="1.7" fill="none" stroke-linecap="round"/>
  <text x="20" y="68" font-family="Georgia" font-style="italic" font-size="6" fill="${c}">y = cos(x)</text>`;});

// 20. Exponential growth
DRAWINGS.push(() => { const c = pickStroke();
  let path = 'M 14 65 ';
  for (let x = 14; x <= 86; x += 2) {
    const y = 65 - Math.exp((x - 14) * 0.06) * 0.8;
    if (y > 12) path += `L ${x.toFixed(1)} ${y.toFixed(1)} `;
  }
  return `<path d="M 12 65 L 90 65" stroke="${c}" stroke-width="1.2" fill="none"/>
  <path d="M 14 12 L 14 70" stroke="${c}" stroke-width="1.2" fill="none"/>
  <path d="${path}" stroke="${c}" stroke-width="1.7" fill="none" stroke-linecap="round"/>
  <text x="40" y="32" font-family="Georgia" font-style="italic" font-size="6" fill="${c}">y = eˣ</text>`;});

// 21. Logarithm
DRAWINGS.push(() => { const c = pickStroke(); return `
  <text x="20" y="42" font-family="Georgia" font-style="italic" font-size="9" fill="${c}">log(ab) = log a + log b</text>
  <text x="40" y="58" font-family="Georgia" font-style="italic" font-size="6" fill="${c}">(log rules)</text>`;});

// 22. Matrix 2x2
DRAWINGS.push(() => { const c = pickStroke(); return `
  <path d="M 30 22 L 26 22 L 26 56 L 30 56" stroke="${c}" stroke-width="1.4" fill="none"/>
  <path d="M 70 22 L 74 22 L 74 56 L 70 56" stroke="${c}" stroke-width="1.4" fill="none"/>
  <text x="36" y="36" font-family="Georgia" font-style="italic" font-size="9" fill="${c}">a  b</text>
  <text x="36" y="52" font-family="Georgia" font-style="italic" font-size="9" fill="${c}">c  d</text>`;});

// 23. Determinant of 2x2
DRAWINGS.push(() => { const c = pickStroke(); return `
  <text x="14" y="42" font-family="Georgia" font-style="italic" font-size="7" fill="${c}">det = ad − bc</text>
  <line x1="30" y1="48" x2="50" y2="48" stroke="${c}" stroke-width="1.2"/>`;});

// 24. Function notation f(x)
DRAWINGS.push(() => { const c = pickStroke(); return `
  <text x="20" y="32" font-family="Georgia" font-style="italic" font-size="9" fill="${c}">f(x) = 2x + 3</text>
  <text x="20" y="50" font-family="Georgia" font-style="italic" font-size="9" fill="${c}">f(4) = 11</text>`;});

// 25. Triangle with bisected angle
DRAWINGS.push(() => { const c = pickStroke(); return `
  <path d="M 20 60 L 80 60 L 50 18 Z" stroke="${c}" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
  <path d="M 50 18 L 50 60" stroke="${c}" stroke-width="1.2" fill="none" stroke-dasharray="2,1.5"/>
  <path d="M 47 30 A 6 6 0 0 0 53 30" stroke="${c}" stroke-width="1" fill="none"/>`;});

// 26. Set notation
DRAWINGS.push(() => { const c = pickStroke(); return `
  <text x="14" y="32" font-family="Georgia" font-style="italic" font-size="8" fill="${c}">S = {1, 2, 3, ...}</text>
  <text x="14" y="50" font-family="Georgia" font-style="italic" font-size="8" fill="${c}">|S| = ∞</text>`;});

// 27. Polar curve (rose)
DRAWINGS.push(() => { const c = pickStroke();
  let path = '';
  for (let i = 0; i <= 200; i++) {
    const t = (i / 200) * 2 * Math.PI;
    const r = 18 * Math.cos(3 * t);
    const x = 50 + r * Math.cos(t);
    const y = 38 + r * Math.sin(t);
    path += (i === 0 ? 'M ' : 'L ') + x.toFixed(1) + ' ' + y.toFixed(1) + ' ';
  }
  return `<path d="${path}" stroke="${c}" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <text x="22" y="68" font-family="Georgia" font-style="italic" font-size="5.5" fill="${c}">r = cos(3θ)</text>`;});

// 28. Vector arrow
DRAWINGS.push(() => { const c = pickStroke(); return `

/* =====================================================================
   TILE WALL CONSTRUCTION
   ===================================================================== */
const wall = document.getElementById('tile-wall');

function shuffled(arr){
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildWall() {
  wall.innerHTML = '';
  const cols = parseInt(getComputedStyle(wall).gridTemplateColumns.split(' ').length, 10) || 8;
  const rows = (cols >= 8) ? 4 : (cols >= 5) ? 5 : 6;
  const total = cols * rows;

  const shuffledDrawings = shuffled(DRAWINGS);

  for (let i = 0; i < total; i++) {
    const tile = document.createElement('div');
    tile.className = 'tile';
    const rot = (Math.random() - 0.5) * 3;
    tile.style.transform = `rotate(${rot}deg)`;
    tile.dataset.baseRot = rot;

    const front = document.createElement('div');
    front.className = 'tile-face front';
    const back = document.createElement('div');
    back.className = 'tile-face back';

    const drawA = shuffledDrawings[i % shuffledDrawings.length];
    const drawB = shuffledDrawings[(i + Math.floor(shuffledDrawings.length / 2)) % shuffledDrawings.length];

    front.innerHTML = `<svg viewBox="0 0 100 75" preserveAspectRatio="xMidYMid meet">${drawA()}</svg>`;
    back.innerHTML = `<svg viewBox="0 0 100 75" preserveAspectRatio="xMidYMid meet">${drawB()}</svg>`;

    tile.appendChild(front);
    tile.appendChild(back);
    wall.appendChild(tile);

    tile.addEventListener('mouseenter', () => flipTile(tile));
  }
}

function flipTile(tile) {
  const flipped = tile.classList.contains('flipped');
  const baseRot = parseFloat(tile.dataset.baseRot || 0);

  if (flipped) {
    tile.classList.remove('flipped');
    tile.style.transform = `rotate(${baseRot}deg)`;
    const back = tile.querySelector('.tile-face.back svg');
    const newDraw = DRAWINGS[Math.floor(Math.random() * DRAWINGS.length)];
    if (back) back.innerHTML = newDraw();
  } else {
    tile.classList.add('flipped');
    tile.style.transform = `rotate(${baseRot}deg) rotateY(180deg)`;
    const front = tile.querySelector('.tile-face.front svg');
    const newDraw = DRAWINGS[Math.floor(Math.random() * DRAWINGS.length)];
    if (front) front.innerHTML = newDraw();
  }
}

buildWall();

let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(buildWall, 250);
});

// Auto-flip-loop voor levendigheid
function autoFlipLoop() {
  const tiles = document.querySelectorAll('.tile');
  if (tiles.length > 0) {
    const tile = tiles[Math.floor(Math.random() * tiles.length)];
    flipTile(tile);
  }
  setTimeout(autoFlipLoop, 800 + Math.random() * 1400);
}
